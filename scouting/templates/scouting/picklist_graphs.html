{% extends 'scouting/base.html' %}

{% block content %}
<div class="container mt-4">
    <h1 class="mb-4">Graphs</h1>
    
    <canvas id="oprDprRankChart"></canvas>
    <canvas id="coralLevelsOneTwoChart" class="mt-4"></canvas>
    <canvas id="coralLevelsThreeFourChart" class="mt-4"></canvas>
    <canvas id="algaeBargeChart" class="mt-4"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const teamNumbers = {{ teams|safe }};
        const oprData = {{ opr_values|safe }};
        const dprData = {{ dpr_values|safe }};
        const rankData = {{ rank_values|safe }};
        const l1Data = {{ l1_coral_values|safe }};
        const l2Data = {{ l2_coral_values|safe }};
        const l3Data = {{ l3_coral_values|safe }};
        const l4Data = {{ l4_coral_values|safe }};
        const netAlgae = {{ net_algae_values|safe }};
        const wallAlgae = {{ wall_algae_values|safe }};
        const bargePoints = {{ barge_points_values|safe }};
        
        function createChart(canvasId, datasets) {
            new Chart(document.getElementById(canvasId).getContext('2d'), {
                type: 'line',
                data: {
                    labels: teamNumbers,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function (context) {
                                    return `Team ${teamNumbers[context.dataIndex]}: ${context.dataset.label} - ${context.raw}`;
                                }
                            }
                        }
                    }
                }
            });
        }

        createChart("oprDprRankChart", [
            { label: "OPR", data: oprData, borderColor: '#F72585', fill: false, tension: 0.4 },
            { label: "DPR", data: dprData, borderColor: "#4CC9F0", fill: false, tension: 0.4 },
        ]);

        createChart("coralLevelsOneTwoChart", [
            { label: "L1 Coral", data: l1Data, borderColor: "#001219", fill: false, tension: 0.4 },
            { label: "L2 Coral", data: l2Data, borderColor: "#4895EF", fill: false, tension: 0.4},
        ]);
        createChart("coralLevelsThreeFourChart", [
            { label: "L3 Coral", data: l3Data, borderColor: "#CDB4DB", fill: false, tension: 0.4 },
            { label: "L4 Coral", data: l4Data, borderColor: "#03045E", fill: false, tension: 0.4},
        ]);


        createChart("algaeBargeChart", [
            { label: "Net Algae", data: netAlgae, borderColor: "#560BAD", fill: false, tension: 0.4 },
            { label: "Wall Algae", data: wallAlgae, borderColor: "#4CC9F0", fill: false, tension: 0.4 },
            { label: "Barge Points", data: bargePoints, borderColor: "#F72585", fill: false, tension: 0.4 }
        ]);
    });
</script>
{% endblock content %}
