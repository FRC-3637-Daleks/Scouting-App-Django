{% extends 'scouting/base.html' %}

{% block content %}
<div class="container mt-4">
    <h1 class="mb-4">Graphs</h1>
    
    <canvas id="oprDprRankChart"></canvas>
    <canvas id="coralLevelsChart" class="mt-4"></canvas>
    <canvas id="algaeBargeCoralChart" class="mt-4"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const teamNumbers = {{ teams|safe }};
        const oprData = {{ opr_values|safe }};
        const dprData = {{ dpr_values|safe }};
        const rankData = {{ rank_values|safe }};
        const l1Data = {{ l1_coral_values|safe }};
        const l2Data = {{ l2_coral_values|safe }};
        const l3Data = {{ l3_coral_values|safe }};
        const l4Data = {{ l4_coral_values|safe }};
        const netAlgae = {{ net_algae_values|safe }};
        const wallAlgae = {{ wall_algae_values|safe }};
        const bargePoints = {{ barge_points_values|safe }};
        const autoCoral = {{ auto_coral_values|safe }};

        function createChart(canvasId, datasets) {
            new Chart(document.getElementById(canvasId).getContext('2d'), {
                type: 'bar',
                data: {
                    labels: teamNumbers,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    scales: {
                        x: {
                            ticks: {
                                autoSkip: false,
                                maxRotation: 90,
                                minRotation: 45,
                                font: {
                                    size: 10
                                }
                            }
                        },
                        y: {
                            beginAtZero: true
                        }
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function (context) {
                                    return `Team ${teamNumbers[context.dataIndex]}: ${context.dataset.label} - ${context.raw}`;
                                }
                            }
                        },
                        legend: {
                            position: 'top'
                        }
                    }
                }
            });
        }

        createChart("oprDprRankChart", [
            { label: "OPR", data: oprData, backgroundColor: '#E63946' }, // red
            { label: "DPR", data: dprData, backgroundColor: '#1D3557' }  // navy
        ]);

        createChart("coralLevelsChart", [
            { label: "L1 Coral", data: l1Data, backgroundColor: '#06D6A0' }, // teal
            { label: "L2 Coral", data: l2Data, backgroundColor: '#FFD166' }, // yellow
            { label: "L3 Coral", data: l3Data, backgroundColor: '#EF476F' }, // pink-red
            { label: "L4 Coral", data: l4Data, backgroundColor: '#118AB2' }  // blue
        ]);

        createChart("algaeBargeCoralChart", [
            { label: "Net Algae", data: netAlgae, backgroundColor: '#073B4C' },   // deep blue
            { label: "Wall Algae", data: wallAlgae, backgroundColor: '#FF9F1C' }, // orange
            { label: "Barge Points", data: bargePoints, backgroundColor: '#2EC4B6' }, // aqua
            { label: "Auto Coral", data: autoCoral, backgroundColor: '#D7263D' }  // bold red
        ]);
    });
</script>
{% endblock content %}
